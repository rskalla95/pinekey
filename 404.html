<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Page Not Found — Pine Key Marketing</title>
  <link rel="icon" type="image/png" href="/logo-pk.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root { --green: #C0ECAC; --black: #090909; --white: #F5F5F0; --muted: #F5F5F0; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      text-align: center;
      padding: 3rem;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025; pointer-events: none; z-index: 9999;
    }

    .logo {
      margin-bottom: 3rem;
    }
    .logo img {
      height: 64px;
      width: auto;
      opacity: 0.7;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Work Sans', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 600;
      line-height: 1;
      color: var(--white);
      margin-bottom: 1.2rem;
    }

    p {
      font-size: 1rem;
      color: var(--muted);
      opacity: 0.6;
      max-width: 36ch;
      margin: 0 auto 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      border: 1px solid var(--green);
      color: var(--black);
      background: var(--green);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.25s, color 0.25s;
    }
    .btn:hover { background: transparent; color: var(--green); }
  </style>
</head>
<body>

  <div class="logo">
    <img src="/logo-pk.png" alt="Pine Key Marketing" />
  </div>

  <p class="eyebrow">404</p>
  <h1>Lost in the woods.</h1>
  <p>This page doesn't exist or may have moved. Head back home and we'll get you sorted.</p>
  <a href="/" class="btn">Back to Home</a>

</body>
</html>
